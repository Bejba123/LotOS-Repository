<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deszyfrator Cyrylica → PL</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #e9eef7; padding: 20px; color: #333; }
    h1 { color: #1a73e8; margin-bottom: 30px; font-size: 2em; }
    .panel { width: 100%; max-width: 600px; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); margin-bottom: 20px; }
    textarea { width: 100%; height: 200px; font-size: 18px; font-family: 'Roboto Mono', monospace; padding: 10px; border-radius: 8px; border: 1px solid #c8d1e0; resize: none; }
</style>
</head>
<body>
<h1>Deszyfrator Cyrylica → PL</h1>
<div class="panel">
    <textarea id="inputCyr" placeholder="Wpisz tekst w cyrylicy..."></textarea>
</div>
<div class="panel">
    <textarea id="outputPl" placeholder="Tutaj pojawi się tekst po polsku..." readonly></textarea>
</div>

<script>
const map = [
    ['A','C'],['Ą','X'],['B','V'],['C','M'],['Ć','Z'],
    ['D','B'],['E','N'],['Ę','Q'],['F','P'],['G','#'],
    ['H','!'],['I','5'],['J','@'],['K','-'],['L','+'],
    ['Ł','='],['M',"'"],['N','>'],['Ń',','],['O','<'],
    ['Ó','.'],['P','Y'],['Q','E'],['R','T'],['S','H'],
    ['Ś','F'],['T','/'],['U','A'],['V','I'],['W','O'],
    ['X','{'],['Y','['],['Z',']'],['Ź','L'],['Ż','J'],
    ['0','&'],['1','*'],['2','%'],['3','$'],['4','^'],
    ['5','?'],['6',':'],['7',';'],['8','_'],['9','~']
];

// Tworzymy mapę deszyfrującą
const cyrToPl = new Map();
map.forEach(([pl,cyr]) => {
    cyrToPl.set(cyr, pl);
    cyrToPl.set(cyr.toLowerCase(), pl.toLowerCase());
});

document.getElementById('inputCyr').addEventListener('input', (e) => {
    const text = e.target.value;
    const result = Array.from(text).map(ch => cyrToPl.get(ch) || ch).join('');
    document.getElementById('outputPl').value = result;
});
</script>
</body>
</html>
